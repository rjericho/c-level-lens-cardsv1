<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C-Level Lens</title>

  <style>
    :root{
      --bg: #f6f3ee;
      --ink: #111;
      --muted: rgba(0,0,0,.62);

      /* background drift vars */
      --px: 0px;
      --py: 0px;
      --hue: 18deg;
    }

    html, body { height: 100%; }
    body{
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font: 18px/1.55 ui-serif, Georgia, "Times New Roman", Times, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ====== BACKGROUND (make it visible) ====== */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background: var(--bg);
    }
    .bg::before{
      content:"";
      position:absolute;
      inset:-20%;
      transform: translate3d(var(--px), var(--py), 0) scale(1.06);
      background:
        radial-gradient(900px 700px at 10% 20%, rgba(255, 120, 170, .25), transparent 60%),
        radial-gradient(900px 700px at 85% 25%, rgba(255, 170, 90, .22), transparent 60%),
        radial-gradient(900px 900px at 30% 95%, rgba(170, 140, 255, .18), transparent 60%),
        radial-gradient(1400px 900px at 75% 110%, rgba(0,0,0,.05), transparent 62%),
        radial-gradient(1200px 900px at 50% 50%, rgba(255,255,255,.35), transparent 62%);
      filter: hue-rotate(var(--hue));
      opacity: .95;
    }
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:.06;
      mix-blend-mode:multiply;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.02), rgba(0,0,0,.02) 1px, transparent 1px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.015), rgba(0,0,0,.015) 1px, transparent 1px, transparent 3px);
      transform: translate3d(calc(var(--px) * .25), calc(var(--py) * .25), 0);
    }

    /* Page width */
    .wrap{
      max-width: 900px;
      margin: 0 auto;
      padding: 0 18px;
    }

    /* ====== STICKY CARD EXPERIENCE (fix stacking) ======
       Each card lives inside a tall "stage". The panel is sticky within that stage.
       That gives the old card room to slide away as the next arrives.
    */
    .stack{
      position: relative;
      margin: 0;
      padding: 0;
    }

    .stage{
      /* This is the runway. Increase if you want slower transitions. */
      min-height: 150vh;
      display: grid;
      align-items: center;
    }

    .card{
      position: sticky;
      top: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .panel{
      width: min(760px, 100%);
      padding: clamp(24px, 4vw, 44px);
      border-radius: 22px;

      /* Make background visible through the panel */
      background: rgba(246, 243, 238, 0.48);
      border: 1px solid rgba(0,0,0,.10);
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      transform: translateY(12px);
      opacity: 0.001;
      transition: opacity 420ms ease, transform 520ms ease;
    }

    .card.is-visible .panel{
      opacity: 1;
      transform: translateY(0);
    }

    /* Hero (Card 0) */
    .card.hero .panel{
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
      width: min(900px, 100%);
    }
    .card.hero h2{
      font-size: clamp(46px, 6vw, 68px);
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin: 0;
      max-width: 24ch;
    }

    h2{
      font-size: clamp(22px, 2.6vw, 28px);
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin: 0 0 14px 0;
    }

    p{
      margin: 0;
      color: rgba(0,0,0,.82);
      max-width: 70ch;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
    }

    .foot{
      padding: 50px 0 90px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-height: 720px){
      .stage{ min-height: 135vh; }
    }

    @media (prefers-reduced-motion: reduce){
      .panel{ transition: none; transform: none; opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <main id="cards" class="stack"></main>
    <div class="foot">Edited via <code>cards.csv</code> · Hosted on GitHub Pages</div>
  </div>

  <script>
    async function loadCSV(path){
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load " + path + " (" + res.status + ")");
      const text = await res.text();
      return parseCSV(text);
    }

    function parseCSV(text){
      const rows = [];
      let i = 0, field = "", row = [], inQuotes = false;

      while (i < text.length){
        const c = text[i];

        if (inQuotes){
          if (c === '"'){
            if (text[i+1] === '"'){ field += '"'; i += 2; continue; }
            inQuotes = false; i++; continue;
          } else {
            field += c; i++; continue;
          }
        } else {
          if (c === '"'){ inQuotes = true; i++; continue; }
          if (c === ','){ row.push(field); field = ""; i++; continue; }
          if (c === '\r'){ i++; continue; }
          if (c === '\n'){
            row.push(field); field = "";
            if (row.some(x => x.trim() !== "")) rows.push(row);
            row = []; i++; continue;
          }
          field += c; i++; continue;
        }
      }
      row.push(field);
      if (row.some(x => x.trim() !== "")) rows.push(row);

      const header = rows.shift().map(h => h.trim());
      return rows.map(r => {
        const o = {};
        header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
        return o;
      });
    }

    function el(tag, attrs={}, children=[]){
      const node = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)){
        if (k === "text") node.textContent = v;
        else node.setAttribute(k, v);
      }
      (Array.isArray(children) ? children : [children]).forEach(ch => {
        if (ch == null) return;
        if (typeof ch === "string") node.appendChild(document.createTextNode(ch));
        else node.appendChild(ch);
      });
      return node;
    }

    function makeStageCard({ id, headline, body }){
      const stage = el("div", { class: "stage" }, []);
      const card = el("section", { class: "card" }, []);
      if (id === 0) card.classList.add("hero");

      const panelKids = [ el("h2", {}, headline) ];
      if (id !== 0 && body) panelKids.push(el("p", {}, body));

      card.appendChild(el("div", { class: "panel" }, panelKids));
      stage.appendChild(card);
      return stage;
    }

    function render(cards){
      const main = document.getElementById("cards");
      main.innerHTML = "";

      const sorted = [...cards].sort((a,b) => Number(a.card_id) - Number(b.card_id));
      for (const c of sorted){
        const id = Number(c.card_id);
        main.appendChild(makeStageCard({
          id,
          headline: c.new_headline || "",
          body: c.new_body || ""
        }));
      }

      // extra runway at the end so last card releases cleanly
      main.appendChild(el("div", { style: "height: 40vh" }, ""));
    }

    function setupVisibilityObserver(){
      const io = new IntersectionObserver((entries) => {
        for (const e of entries){
          if (e.isIntersecting) e.target.querySelector(".card")?.classList.add("is-visible");
        }
      }, { threshold: 0.35 });

      document.querySelectorAll(".stage").forEach(s => io.observe(s));
    }

    // background drift
    (function backgroundDrift(){
      const root = document.documentElement;
      let lastY = window.scrollY || 0;
      let lastT = performance.now();
      let v = 0, raf = 0;

      function clamp(x,a,b){ return Math.max(a, Math.min(b, x)); }

      function tick(){
        const now = performance.now();
        const y = window.scrollY || 0;
        const dt = Math.max(16, now - lastT);
        const dy = y - lastY;

        const vTarget = Math.abs(dy) / dt;
        v = v * 0.86 + vTarget * 0.14;
        const intensity = clamp(v * 18, 0, 1);

        const doc = document.documentElement;
        const max = Math.max(1, doc.scrollHeight - doc.clientHeight);
        const s = y / max;

        const amp = 4 + intensity * 26;
        const px = Math.sin(s * Math.PI * 2.0) * amp;
        const py = (s - 0.5) * amp * 1.5;
        const hue = 18 + intensity * 18;

        root.style.setProperty("--px", px.toFixed(2) + "px");
        root.style.setProperty("--py", py.toFixed(2) + "px");
        root.style.setProperty("--hue", hue.toFixed(2) + "deg");

        lastY = y; lastT = now;

        if (intensity > 0.01) raf = requestAnimationFrame(tick);
        else raf = 0;
      }

      function onScroll(){
        if (!raf) raf = requestAnimationFrame(tick);
      }

      onScroll();
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", onScroll);
    })();

    (async function(){
      try{
        const cards = await loadCSV("cards.csv");
        render(cards);
        setupVisibilityObserver();
      } catch (e){
        const main = document.getElementById("cards");
        main.innerHTML = "";
        main.appendChild(el("div", { class: "stage" }, [
          el("section", { class: "card is-visible" }, [
            el("div", { class: "panel" }, [
              el("h2", {}, "Couldn’t load cards.csv"),
              el("p", {}, String(e))
            ])
          ])
        ]));
      }
    })();
  </script>
</body>
</html>
